name: Build APK Mandiri

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Tambal Semua Resource yang Kurang
      run: |
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        cat << 'EOF' > app/src/main/res/values/colors_m3.xml
        <resources>
            <color name="md_theme_tertiary">#7D5260</color>
            <color name="md_theme_onTertiary">#FFFFFF</color>
            <color name="md_theme_tertiaryContainer">#FFD8E4</color>
            <color name="md_theme_onTertiaryContainer">#31111D</color>
        </resources>
        EOF
        cat << 'EOF' > app/src/main/res/values/styles_dummy.xml
        <resources>
            <style name="AppTheme.AppBarOverlay" parent="ThemeOverlay.AppCompat.Dark.ActionBar" />
            <style name="AppTheme.PopupOverlay" parent="ThemeOverlay.AppCompat.Light" />
        </resources>
        EOF
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#000000" android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2z"/></vector>' > app/src/main/res/drawable/ic_circle_solid.xml
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#000000" android:pathData="M12,2c-5.5,0 -10,4.5 -10,10s4.5,10 10,10 10,-4.5 10,-10 -4.5,-10 -10,-10zM12,17c-0.55,0 -1,-0.45 -1,-1v-4c0,-0.55 0.45,-1 1,-1s1,0.45 1,1v4c0,0.55 -0.45,1 -1,1zM12,9c-0.55,0 -1,-0.45 -1,-1s0.45,-1 1,-1 1,0.45 1,1 -0.45,1 -1,1z"/></vector>' > app/src/main/res/drawable/ic_info_24dp.xml

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK & Suntik Konfigurasi Gradle
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '10i\        \n    ndkVersion = "28.2.13676358"' "${{ github.workspace }}/app/build.gradle.kts"
        sed -i '/android {/a \    splits { abi { isEnable = true; reset(); include("armeabi-v7a", "arm64-v8a"); isUniversalApk = false } }' "${{ github.workspace }}/app/build.gradle.kts"

    - name: Buat Skrip dan Kompilasi libhevtun
      run: |
        mkdir -p jni/hev-socks5-tunnel
        cat << 'EOF' > jni/Android.mk
        LOCAL_PATH := $(call my-dir)
        include $(CLEAR_VARS)
        LOCAL_MODULE := hevtun
        LOCAL_SRC_FILES := $(wildcard hev-socks5-tunnel/src/**/*.c) $(wildcard hev-socks5-tunnel/src/*.c)
        LOCAL_CFLAGS := -O3 -DPKGNAME=com/example/chatoex/service
        LOCAL_LDFLAGS := -Wl,--build-id=none -Wl,--hash-style=gnu
        include $(BUILD_SHARED_LIBRARY)
        EOF
        if [ -d "hev-socks5-tunnel" ]; then
          cp -r hev-socks5-tunnel/* jni/hev-socks5-tunnel/
        fi
        $NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            "APP_ABI=armeabi-v7a arm64-v8a" \
            APP_PLATFORM=android-24 \
            NDK_LIBS_OUT=libs \
            NDK_OUT=obj

    - name: Download libv2ray AAR & Buat Custom Routing Assets
      run: |
        mkdir -p app/libs
        mkdir -p app/src/main/assets
        wget -q "https://github.com/unarto/Xraycorev26.1.3/releases/download/V26.1.23/libv2ray.aar" -O app/libs/libv2ray.aar || true
        wget -q "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -O app/src/main/assets/geoip.dat || true
        wget -q "https://github.com/v2fly/geosite/releases/latest/download/geosite.dat" -O app/src/main/assets/geosite.dat || true
        echo '{"routing":{"domainStrategy":"IPIfNonMatch","rules":[{"type":"field","outboundTag":"block","domain":["geosite:category-ads-all"]},{"type":"field","outboundTag":"direct","domain":["geosite:google","domain:id","domain:go.id"],"ip":["geoip:private","geoip:id"]},{"type":"field","outboundTag":"proxy","network":"tcp,udp"}]}}' > app/src/main/assets/custom_routing.json

    - name: Pindahkan Hasil Kompilasi Libs ke Modul App
      run: |
        mkdir -p app/src/main/jniLibs
        if [ -d "libs" ]; then
          cp -r libs/* app/src/main/jniLibs/
        fi

    - name: Tambal Referensi Kode Kotlin yang Hilang
      run: |
        [ -f app/src/main/java/com/v2ray/ang/ui/HotshareActivity.kt ] && sed -i 's/PREF_HTTP_PORT/"pref_http_port"/g' app/src/main/java/com/v2ray/ang/ui/HotshareActivity.kt
        [ -f app/src/main/java/com/v2ray/ang/util/Utils.kt ] && sed -i 's/BuildConfig.FLAVOR/""/g' app/src/main/java/com/v2ray/ang/util/Utils.kt
        [ -f app/src/main/java/com/v2ray/ang/util/Utils.kt ] && sed -i 's/FLAVOR/""/g' app/src/main/java/com/v2ray/ang/util/Utils.kt

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK Split via Gradle
      run: ./gradlew assembleDebug

    - name: Upload Semua Hasil Split APK
      uses: actions/upload-artifact@v4
      with:
        name: cemplung-vpn-split-apks
        path: app/build/outputs/apk/debug/**/*.apk
